<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>VoCo HUD · 极简</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background:
      radial-gradient(circle at 18% 22%, #2a3148 0%, transparent 38%),
      radial-gradient(circle at 78% 70%, #38234c 0%, transparent 44%),
      linear-gradient(135deg, #0c1018, #1a1f2c);
    color: #f4f5f7;
    overflow: hidden;
  }
  .fake-desktop {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .controls {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 100;
    background: rgba(255,255,255,0.05); padding: 10px;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    backdrop-filter: blur(20px);
  }
  .controls button {
    font: inherit; color: #f4f5f7;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.08);
    padding: 8px 14px; border-radius: 8px; cursor: pointer;
  }
  .controls button:hover { background: rgba(255,255,255,0.15); }
  .controls button.active { background: #2563eb; border-color: #2563eb; }

  .label-hint {
    position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
    color: rgba(244,245,247,0.55); font-size: 13px;
  }

  /* 真·极简 HUD：更小、更圆润、更安静 */
  .hud {
    position: fixed; left: 50%; bottom: 80px;
    transform: translateX(-50%) translateY(0);
    width: 96px; height: 36px;
    background: #0a0a0a;
    border-radius: 18px;
    box-shadow:
      0 6px 20px rgba(0,0,0,0.45),
      0 1px 4px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    gap: 5px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s ease, transform .3s ease, width .3s ease;
  }
  .hud.show { opacity: 1; }
  .hud.hide-down { opacity: 0; transform: translateX(-50%) translateY(12px); }

  .hud .bar {
    width: 3px; min-height: 4px; max-height: 20px;
    background: #ffffff;
    border-radius: 1.5px;
    transition: height 140ms ease;  /* 慢一点 = 更安静 */
  }

  .footer-note {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    color: rgba(244,245,247,0.45); font-size: 12px;
  }
</style>
</head>
<body>
<div class="fake-desktop"></div>

<div class="controls">
  <button class="btn active" data-state="listening">🎤 聆听</button>
  <button class="btn" data-state="processing">⚡ 识别</button>
  <button class="btn" data-state="hidden">隐藏</button>
</div>
<div class="label-hint">96 × 36 · 5 根波形 · 慢动效</div>

<div class="hud show" id="hud"></div>

<div class="footer-note">VoCo HUD · 极简，让它在那但不喊"看我"</div>

<script>
  // 设计取舍记录（写代码的我跟以后改代码的我对话）：
  //   - 5 根波形：3 根太单调像加载条 / 7+ 根开始有"波纹"感容易吸眼
  //   - 高度 20px 上限 + 宽度 96 → 整体压缩感强、好忽略
  //   - 聆听更新间隔 140ms（vs 上一版 90ms） → 同样的音量数据看起来更稳
  //   - 识别状态用 "中间两根呼吸" 而不是水平波纹流动 → 移动量更小
  //   - 不加颜色 / 不加文字 / 不加计时 → 用户只读到"软件在听"这一个信息

  const hud = document.getElementById('hud');
  const buttons = document.querySelectorAll('.controls .btn');
  const BAR_COUNT = 5;
  let timer = null;

  function buildBars() {
    hud.innerHTML = '';
    const bars = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const b = document.createElement('div');
      b.className = 'bar';
      b.style.height = '4px';
      hud.appendChild(b);
      bars.push(b);
    }
    return bars;
  }

  function stop() { if (timer) { clearInterval(timer); timer = null; } }

  // 聆听：5 根条按音量起伏，中间略高，整体起伏柔和
  function listening(bars) {
    let t = 0;
    timer = setInterval(() => {
      t += 1;
      const volume = 0.45 + Math.sin(t / 10) * 0.25 + Math.random() * 0.3;
      bars.forEach((b, i) => {
        const mid = (BAR_COUNT - 1) / 2;
        const distance = Math.abs(i - mid) / mid;
        const base = (1 - distance * 0.5) * 16 * volume;
        const jitter = Math.random() * 3;
        const h = Math.max(4, base + jitter);
        b.style.height = Math.min(20, h) + 'px';
      });
    }, 140);
  }

  // 识别：3 根中间条做"呼吸"动画，左右 2 根静止较短 → 看着像在思考
  // 速度调到正经"在跑"的节奏：t 步进 0.45 + 60ms 一帧
  function processing(bars) {
    let t = 0;
    timer = setInterval(() => {
      t += 0.45;
      bars.forEach((b, i) => {
        if (i === 0 || i === BAR_COUNT - 1) {
          b.style.height = '4px';
        } else {
          const offset = (i - 1) * 0.9;
          const h = 6 + (Math.sin(t - offset) * 0.5 + 0.5) * 14;
          b.style.height = h.toFixed(1) + 'px';
        }
      });
    }, 60);
  }

  function render(state) {
    stop();
    hud.classList.remove('hide-down');
    if (state === 'hidden') {
      hud.classList.remove('show');
      hud.classList.add('hide-down');
      return;
    }
    const bars = buildBars();
    hud.classList.add('show');
    if (state === 'listening') listening(bars);
    if (state === 'processing') processing(bars);
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.state);
    });
  });

  render('listening');
</script>
</body>
</html>
